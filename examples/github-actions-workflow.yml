name: Use pr-ai-reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout PR code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Install Ollama
      run: |
        curl -fsSL https://ollama.ai/install.sh | sh
        ollama serve &
        sleep 5
        ollama pull llama3.1:8b-instruct
    
    - name: Checkout pr-ai-reviewer
      uses: actions/checkout@v4
      with:
        repository: yourusername/pr-ai-reviewer
        path: pr-ai-reviewer
    
    - name: Install pr-ai-reviewer dependencies
      working-directory: ./pr-ai-reviewer
      run: |
        npm ci
        npm run build
    
    - name: Create config files
      working-directory: ./pr-ai-reviewer
      run: |
        cat > pr-ai-reviewer.config.yaml << EOF
        provider: github
        repos:
          - ${{ github.repository }}
        run_mode: cli
        ollama:
          host: 127.0.0.1
          port: 11434
          model: llama3.1:8b-instruct
          use_openai_compat: true
          temperature: 0.3
          max_tokens: 4096
          timeout_ms: 180000
        review:
          max_files: 50
          labeling_enabled: false
          summary_enabled: true
          dedupe_window_days: 14
          excluded_paths:
            - "**/*.lock"
            - "**/*.min.js"
        auth:
          github:
            type: pat
            token_env: GITHUB_TOKEN
        EOF
        
        cat > AI-review-request.txt << EOF
        [Checks]
        Security: weight=5 - SQL injection, secrets exposure, XSS
        Reliability: weight=4 - null checks, error handling
        Performance: weight=3 - inefficient algorithms
        
        [Must-Check]
        Ensure no secrets in code
        Validate external inputs
        Proper error handling
        EOF
    
    - name: Run AI Review
      working-directory: ./pr-ai-reviewer
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        npm start review-pr \
          --repo ${{ github.repository }} \
          --pr ${{ github.event.pull_request.number }} \
          --config ./pr-ai-reviewer.config.yaml \
          --policy ./AI-review-request.txt
    
    - name: Comment on PR if review failed
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: '⚠️ AI code review failed. Please check the workflow logs for details.'
          })
